# data path
data_type: "single"
data_root: "/scratch/up1084667/MyThesis/DFEW_Dataset"
work_dir: "./work_dir/mc3_18"

num_epoch: 30           
batch_size: 32          
num_workers: 8

# Model Settings
model_name: "mc3_18"    
num_classes: 7
model_pretrain: True    
model_init: False

# Input Settings
nframe: 16              
size_Resize_te: 112     
isconsecutive: False

loss_type: "WCEL"

# Optimizer & Scheduler
optimizer: "SGD"
