weight_decay: 0.0005
lr_strategy: True
scheduler: "StepLR"
step_size: 10
lr_gamma: 0.1

# Augmentation (Ρυθμισμένα για 112x112)
train_data_augment: True
Flag_RandomRotation: True
degree_RandomRotation: 10

Flag_RandomResizedCrop: True
size_RandomResizedCrop: 112     

Flag_RandomHorizontalFlip: True
prob_RandomHorizontalFlip: 0.5
Flag_RandomVerticalFlip: False

Flag_CenterCrop: False
size_CenterCrop: 112            
Flag_RamdomErasing: False
prob_RandomErasing: 0.
Flag_Resize_te: True
